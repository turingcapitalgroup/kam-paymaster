name: CI

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Install dependencies
        run: forge soldeer install

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        run: forge build --sizes
        env: 
          DEPLOYMENT_BASE_PATH: ${{ secrets.DEPLOYMENT_BASE_PATH }}
          PAYMASTER_DEPLOYMENT_BASE_PATH: ${{ secrets.PAYMASTER_DEPLOYMENT_BASE_PATH}}

      - name: Run Forge tests
        run: forge test -vvv
        env:
          DEPLOYMENT_BASE_PATH: ${{ secrets.DEPLOYMENT_BASE_PATH }}
          PAYMASTER_DEPLOYMENT_BASE_PATH: ${{ secrets.PAYMASTER_DEPLOYMENT_BASE_PATH }}
